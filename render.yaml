services:
  - type: web
    name: ek-scraper
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y gcc libxml2-dev libxslt-dev
      pip install uv
      uv lock
      uv sync --frozen --no-dev
    startCommand: python -m ek_scraper.cli run config.json
    envVars:
      - key: PYTHON_VERSION
        value: 3.11

  - type: worker
    name: scraper-high-freq
    env: python
    plan: free
    buildCommand: uv sync --frozen
    startCommand: python -m ek_scraper.cli run config_highfreq.json --loop 15

  - type: worker
    name: scraper-medium
    env: python
    plan: free
    buildCommand: uv sync --frozen
    startCommand: python -m ek_scraper.cli run config_medium.json --loop 60

  - type: worker
    name: scraper-low
    env: python
    plan: starter
    buildCommand: uv sync --frozen
    startCommand: python -m ek_scraper.cli run config_lowfreq.json --loop 900
